name: Build SAMP Launcher APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-2022
    env:
      DOTNET_CLI_TELEMETRY_OPTOUT: 1
      DOTNET_NOLOGO: 1
    steps:
      - uses: actions/checkout@v4

      - name: ✅ Cài .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x
          cache: nuget

      - name: ✅ Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: microsoft
          java-version: 17

      - name: ✅ Chỉ cài ANDROID — KHÔNG CÓ MAUI NỮA
        run: dotnet workload install android --accept-licenses

      - name: ✅ Chấp nhận giấy phép SDK Android
        run: |
          $sdkDir = & "$env:JAVA_HOME/bin/keytool" -list 2>&1 | Out-Null
          New-Item -ItemType Directory -Path "$env:USERPROFILE\.android" -Force | Out-Null
          Set-Content -Path "$env:USERPROFILE\.android\repositories.cfg" -Value ""

      - name: ✅ Tạo khóa ký APK tự động
        run: |
          keytool -genkey -v -keystore debug.keystore -storepass android -alias androiddebugkey -keypass android -keyalg RSA -keysize 2048 -validity 10000 -dname "CN=Android Debug,O=Android,C=US"

      - name: ✅ Khôi phục gói
        run: dotnet restore

      - name: ✅ Biên dịch APK
        run: dotnet publish -c Release -f net9.0-android -p:AndroidPackageFormat=apk -p:AndroidKeyStore=true -p:AndroidSigningKeyStore=debug.keystore -p:AndroidSigningKeyAlias=androiddebugkey -p:AndroidSigningKeyPass=android -p:AndroidSigningStorePass=android

      - name: ✅ Tìm & đóng gói APK
        run: |
          $apk = Get-ChildItem -Path . -Recurse -Filter "*.apk" | Select-Object -First 1 -ExpandProperty FullName
          echo "Tìm thấy: $apk"
          New-Item -Path out -ItemType Directory -Force | Out-Null
          Copy-Item $apk out/SAMPLauncher.apk

      - name: 📤 Tải lên thành phẩm
        uses: actions/upload-artifact@v4
        with:
          name: SAMPLauncher_APK
          path: out/*.apk
