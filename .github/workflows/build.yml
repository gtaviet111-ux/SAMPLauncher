.github/workflows/build.yml
name: Build SAMP Launcher APK
on:
  push:
    branches: [ main ]
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup .NET 10
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true
      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'
      - name: Install workloads
        run: dotnet workload install android maui --accept-licenses
      - name: Restore
        run: dotnet restore
      - name: Publish APK
        run: dotnet publish -c Release -f net10.0-android -p:AndroidSigning=true -p:AndroidPackageFormat=apk
      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: SAMPLauncher_APK
          path: bin/Release/net10.0-android/publish/*.apk
