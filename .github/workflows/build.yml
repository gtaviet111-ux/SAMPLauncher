name: Build SAMP Launcher APK
on:
  push:
    branches: [ main ]
  workflow_dispatch

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET 9
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Cài workload & chấp nhận giấy phép Android
        run: |
          dotnet workload install android maui --accept-licenses
          dotnet build -t:InstallAndroidDependencies -f net9.0-android -p:AcceptAndroidSDKLicenses=true

      - name: Khôi phục gói
        run: dotnet restore

      - name: Biên dịch APK
        run: dotnet publish -c Release -f net9.0-android -p:AndroidSigningKeyStore=debug.keystore -p:AndroidSigningKeyAlias=androiddebugkey -p:AndroidSigningKeyPass=android -p:AndroidSigningStorePass=android -p:AndroidPackageFormat=apk

      - name: Tải APK
        uses: actions/upload-artifact@v4
        with:
          name: SAMPLauncher_APK
          path: bin/Release/net9.0-android/publish/*.apk
