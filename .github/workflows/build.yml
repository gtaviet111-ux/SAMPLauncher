name: Build SAMP Launcher APK
on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: windows-latest
    steps:
      - name: Lấy mã nguồn
        uses: actions/checkout@v4

      - name: Cài .NET 9 (bản ổn định)
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '9.0.x'

      - name: Cài JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'microsoft'
          java-version: '17'

      - name: Cài MAUI + Android
        run: dotnet workload install android maui --accept-licenses

      - name: Khôi phục gói
        run: dotnet restore

      - name: Biên dịch APK
        run: dotnet publish -c Release -f net9.0-android -p:AndroidSigning=true -p:AndroidPackageFormat=apk

      - name: Lưu APK
        uses: actions/upload-artifact@v4
        with:
          name: SAMPLauncher_APK
          path: bin/Release/net9.0-android/publish/*.apk
